services:
  gateway:
    image: caddy:2-alpine
    container_name: transcendence_gateway
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./frontend/dist:/srv/frontend/dist
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - front_net
    depends_on:
      - backend

  frontend:
    build: ./frontend
    container_name: transcendence_frontend
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - front_net
    environment:
      - VITE_API_URL=${VITE_API_URL}

  backend:
    build: ./backend
    container_name: transcendence_backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - front_net
      - back_net
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OLLAMA_HOST=${OLLAMA_HOST}
      - NODE_ENV=${NODE_ENV}
      - PORT=${BACKEND_PORT}
    depends_on:
      - database

  database:
    image: postgres:15-alpine
    container_name: transcendence_database
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - back_net

  ai:
    image: ollama/ollama:latest
    container_name: transcendence_ai
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - back_net

networks:
  front_net:
    driver: bridge
  back_net:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:
  caddy_data:
  caddy_config: