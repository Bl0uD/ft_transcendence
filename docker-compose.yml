services:
  caddy:
    image: caddy:2-alpine
    container_name: transcendence_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - frontend_dist:/srv/frontend/dist
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - front_net
    depends_on:
      - backend

  frontend:
    build: ./frontend
    container_name: transcendence_frontend
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - frontend_dist:/app/dist
    ports:
      - "5173:5173"
    networks:
      - front_net
    environment:
      - VITE_API_URL=${VITE_API_URL}

  backend:
    build: ./backend
    container_name: transcendence_backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - front_net
      - back_net
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OLLAMA_HOST=${OLLAMA_HOST}
      - NODE_ENV=${NODE_ENV}
      - PORT=${BACKEND_PORT}
    depends_on:
      database:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npm run start:dev"

  database:
    image: postgres:15-alpine
    container_name: transcendence_database
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - back_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  ai:
    image: ollama/ollama:latest
    container_name: transcendence_ai
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - back_net

networks:
  front_net:
    driver: bridge
  back_net:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:
  caddy_data:
  caddy_config:
  frontend_dist: