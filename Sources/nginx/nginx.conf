# HTTPS server block - defines virtual host configuration
server {
    
    listen	443 ssl; # Listen on port 443 (HTTPS) for IPv4 connections with SSL enabled
    listen	[::]:443 ssl; # Same for IPv6.

    server_name	$DOMAIN_NAME;

	# Paths to certificates HTTPS (generated dynamically from environment variables):
	ssl_certificate		/etc/nginx/ssl/nginx.crt; # SSL certificate file for domain validation
	ssl_certificate_key	/etc/nginx/ssl/nginx.key; # SSL private key file for encryption

	# Specify supported TLS protocol versions for secure communication
	ssl_protocols		TLSv1.2 TLSv1.3; 

    # =========================
    # FRONTEND NEXT.JS
    # =========================
	location / {
        proxy_pass https://frontend:3000;
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Next.js support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

	# =========================
    # BACKEND API (REST)
    # =========================
    location /api/ {
        proxy_pass https://backend:8000/;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # JWT / headers sécurité
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

	# =========================
    # WEBSOCKET (GAME / CHAT)
    # =========================
    location /ws/ {
        proxy_pass https://backend:8000/ws/;

        proxy_http_version 1.1;

        # IMPORTANT pour WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        proxy_set_header Host $host;

        proxy_read_timeout 86400;
        proxy_send_timeout 86400;

        proxy_buffering off;
    }

    # =========================
    # SECURITY HEADERS (IMPORTANT 42)
    # =========================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
}
