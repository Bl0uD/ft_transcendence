services:
  nginx:
    container_name: nginx
    image: nginx:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf:/etc/nginx/conf.d
    depends_on:
      - frontend
      - backend
    networks:
      - transcendance_network

  frontend:
    container_name: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../Secrets/.env
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    networks:
      - transcendance_network
    volumes:
      - ./frontend:/app

  backend:
    container_name: backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../Secrets/.env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    networks:
      - transcendance_network
    volumes:
      - ./backend:/app

  postgres:
    container_name: postgres
    image: postgres:15
    restart: unless-stopped
    env_file:
      - ../Secrets/.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - transcendance_network
    ports:
      - "5432:5432"

volumes:
  postgres-data:

networks:
  transcendance_network:
    driver: bridge